function ClickCounter(){
  const[count,setCount]=React.useState(0);

  function handleClick(){
    setCount(count+1);
  }

  return(
    <button onClick={handleClick}>
        Count:{count}  
    </button>
  )
}



function Taskcard(){
  const [completed,setCompleted]=React.useState(false);
  return (
    <div>
      <p>Complete Learning Python-Numpy</p>
      <button onClick={()=>{
          setCompleted(!completed)
          }}
          style={{
          backgroundColor:completed? "green":"red",
          color:"white"
        }}

      >{completed ? "Completed":"Mark Complete"}</button>
    </div>
  )
}


function SessionTracker(){
  const [sessionsCompleted,setsessionsCompleted]=React.useState(0);

  return(
    <>
      <p>Promodoro Sessions:{sessionsCompleted}</p>
      <button onClick={()=>{
        setsessionsCompleted(sessionsCompleted +1)
      }}>Log Session</button>

      <button onClick={()=>{
        setsessionsCompleted(0)
      }}>Reset</button>

    </>
  )
}

  )
}


function Form(){
  const [person,setPerson]=React.useState({
    name: 'Niki de Saint Phalle',
    artwork: {
      title: 'Blue Nana',
      city: 'Hamburg',
      image: 'https://react.dev/images/docs/scientists/Sd1AgUOm.jpg',
    }
  });

  function handleFirstNameChange(e){
    setPerson({
        ...person,
       firstName:e.target.value
    })
   
  }

  function handleTitleChange(e){
    setPerson({
      ...person,
      artwork:{
          ...person.artwork,
          title:e.target.value

      }
   

    })
    
  }

  function handleEmailChange(e){
    setPerson({
      ...person,
        email:e.target.value
    })
    
  }

  return (
    <div>
    <label>
        First Name:
        <input 
        value={person.firstName}
        onChange={handleFirstNameChange}
        />
    </label> 
    <label>
        Title:
        <input 
        value={person.lastName}
        onChange={handleTitleChange}
        />
    </label> 
    <label>
        Email:
        <input 
        value={person.email}
        onChange={handleEmailChange}
        />
    </label> 

    <p>{person.firstName}{" "}
        {person.lastName}{" "}
        {person.email}{" "}
    </p>
    </div>
  )



}


 
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <>
      {<Form />}
      </> 
    );





  </script>
