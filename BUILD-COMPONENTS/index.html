<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Single File App</title>

 
</head>

<body>

  <div id="root"></div>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React Code -->

  
  <script type="text/babel">

    const gamers=[
      {
        name:"Divas",
        game:"Valorant",
        rank:"Daimond"
      },
       {
        name:"Tushar",
        game:"Valorant",
        rank:"Gold"
      },
       {
        name:"Dewash",
        game:"Valorant",
        rank:"Pro"
      }
  
  
  ]
    function GamerCard({name,game,rank}){
      return(
          <>
           <div>{name}</div>
           <div>game:{game}</div>
           <div>rank:{rank}</div>
          </>
      )
    }
  function GamerInfo() {

    return(
      <>
     {gamers.map((players)=>(
      <GamerCard
        key={players.name}
        name={players.name}
        game={players.game}
        rank={players.rank}
      />
     ))}
     </>
     )
}

function ProfileCard({name,role,hobby,emoji}){
  return(
    <>
      {name}
      Role:{role}
      Hobby:{hobby}
      Emoji:{emoji}
    </>
  )
}
function ProfileDetails(){
  return(
    <ProfileCard
        name="Divas"
        role="Data Science Student"
        hobby="Aviation geek"
        emoji="✈️"
    />
  )
}


function Admin(){
  return(
    <>
      <h2>Admin Panel</h2>
      <input type="text" placeholder="Enter admin email" />
      <button>Login as Admin</button>
    </>
  )
}

function User(){
  return(
    <>
      <h2>User Panel</h2>
      <input type="text" placeholder="Enter username" />
      <button>Login as User</button>
    </>
  )
}

const isAdmin= true;

const isLogedIn=false;





const movies = [
  {
    title: "Interstellar",
    year: 2014,
    genre: "Sci-Fi",
    isTrending:"true"
  },
  {
    title: "Top Gun Maverick",
    year: 2022,
    genre: "Action",
    isTrending:"false"
  },
  {
    title: "Oppenheimer",
    year: 2023,
    genre: "Drama",
    isTrending:"true"
  }
]

function NetflixMovie(){

   return (
    <div>
      {movies.map((movie)=>(

         <div  key={movie.title} style={{ marginBottom: "15px" }}>
            <p>{movie.title}</p>
            {movie.isTrending?<p>"Trending🔥"</p>:<p>"Toprated⭐"</p>}
            <p>{movie.year}</p>
            <p>{movie.genre}</p>
            
         </div>
      )
      )} 
    </div>
   )
  }
    




      

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <>
        {isAdmin ? <Admin />:<User />}
        {isLogedIn? <h1>Welcome Back!</h1>:<button>Login</button>}
        <NetflixMovie />
      </>
    );

  </script>

</body>
</html>
