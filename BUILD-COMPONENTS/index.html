<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Single File App</title>
<style>
  .current-weather-card {
  width: 100%;
  max-width: 1200px;

  padding: 40px;

  border-radius: 30px;

  background: #e8ebf7;

  

  display: flex;
  flex-direction: column;
  gap: 50px;
}

/* Header */
.weather-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.weather-label {
  font-size: 20px;
  color: #555;
}

.current-time {
  font-size: 50px;
  margin-top: 10px;
  font-weight: 500;
}

.temperature-unit {
  display: flex;
  align-items: center;
  gap: 10px;

  font-size: 28px;
}

/* Middle Section */
.weather-main-info {
  display: flex;
  align-items: center;
  gap: 30px;
}

.weather-icon {
  font-size: 80px;
}

.temperature {
  display: flex;
  align-items: flex-start;
}

.temperature h1 {
  font-size: 100px;
  font-weight: 500;
}

.temperature span {
  font-size: 45px;
  margin-top: 15px;
}

.weather-details h3 {
  font-size: 35px;
  font-weight: 500;
}

.weather-details p {
  font-size: 30px;
  color: #444;
}

/* Bottom */
.weather-description {
  font-size: 42px;
  line-height: 1.4;
}
</style>
 
</head>

<body>

  <div id="root"></div>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React Code -->
  <script type="text/babel">

  function CurrentWeatherCard() {
  return (
    <div className="current-weather-card">

      {/* Top Section */}
      <div className="weather-card-header">

        <div>
          <span className="weather-label">Current Weather</span>
          <h3 className="current-time">2:59PM</h3>
        </div>

        <div className="temperature-unit">
          <span>Forenheight</span>
          <span>⌄</span>
        </div>

      </div>

      {/* Middle Section */}
      <div className="weather-main-info">

        {/* Weather Icon */}
        <div className="weather-icon">
          🌤️
        </div>

        {/* Temperature */}
        <div className="temperature">
          <h1>12</h1>
          <span>°F</span>
        </div>

        {/* Weather Details */}
        <div className="weather-details">
          <h3>Rainy</h3>
          <p>Feels Like 35°</p>
        </div>

      </div>

      {/* Bottom Description */}
      <p className="weather-description">
        There will be mostly sunny skies. The high will be 35°
      </p>

    </div>
  );
}

      

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CurrentWeatherCard />);

  </script>

</body>
</html>
