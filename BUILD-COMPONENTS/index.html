<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Single File App</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #bfc2d3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .stat-card {
      width: 320px;
      height: 160px;
      background: #d6d7e2;
      border: 3px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      padding: 28px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 8px 20px rgba(0,0,0,0.08);
    }

    .stat-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
    }

    .stat-title {
      font-size: 18px;
      font-weight: 500;
      color: #2f3443;
    }

    .stat-value {
      font-size: 58px;
      font-weight: 700;
      color: #111827;
      line-height: 1;
      margin-left: 48px;
    }

    .forecast-card {
      width: 720px;
      background: #d6d7e2;
      border-radius: 28px;
      margin-top: 28px;
      padding: 26px 32px;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 8px 20px rgba(0,0,0,0.08);
    }

    .forecast-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .forecast-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 250px;
    }

    .forecast-weather-icon {
      font-size: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .forecast-time {
      font-size: 18px;
      color: #4b5563;
      margin-bottom: 4px;
    }

    .forecast-condition {
      font-size: 22px;
      font-weight: 600;
      color: #111827;
    }

    .forecast-divider {
      width: 1px;
      height: 88px;
      background: rgba(0,0,0,0.1);
    }

    .forecast-temp {
      font-size: 64px;
      font-weight: 500;
      color: #111827;
      line-height: 1;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }

    .forecast-temp span {
      font-size: 28px;
      margin-top: 8px;
    }

    .forecast-extra {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 18px;
      color: #4b5563;
      min-width: 170px;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React Code -->
  <script type="text/babel">

    function StatCard() {
      return (
         <>
        <div className="stat-card">
          <div className="stat-top">
            <div className="stat-icon">🌪️</div>
            <span className="stat-title">Air Quality</span>
          </div>

          <h3 className="stat-value">156</h3>
        </div>


        
        <div className="forecast-card">
          <div className="forecast-row">

            <div className="forecast-left">
              <div className="forecast-weather-icon">⛈️</div>

              <div>
                <p className="forecast-time">1AM</p>
                <h3 className="forecast-condition">Mostly Cloudy</h3>
              </div>
            </div>

            <div className="forecast-divider"></div>

            <div className="forecast-temp">
              12<span>°C</span>
            </div>

            <div className="forecast-extra">
              <p>Wind: 120km</p>
              <p>Humidity: 59%</p>
            </div>

          </div>
        </div>
         

        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<StatCard />);

  </script>

</body>
</html>
